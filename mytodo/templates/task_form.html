{% extends 'index.html' %}

{% block title %}Task Form{% endblock %}

{% block style %}
{% endblock %}

{% block content %}
<h2>{% if form.instance.pk %}Edit Task{% else %}Create Task{% endif %}</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> to Save 💾</button>
</form>
{% endblock %}
